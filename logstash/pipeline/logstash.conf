input {
  beats {
    port => 5044

    ssl_enabled => true
    ssl_certificate => "/usr/share/logstash/config/certs/elk/logstash/logstash.crt"
    ssl_key         => "/usr/share/logstash/config/certs/elk/logstash/logstash.key"
    ssl_certificate_authorities => ["/usr/share/logstash/config/certs/ca-beats/ca-beats-full-chain.crt"]
    ssl_client_authentication => "required"
  }
}

# =============================================================================
# Pipeline Logstash — enrichissement PAR EVENEMENT pour l'autoencodeur
# -----------------------------------------------------------------------------
# Principe : Logstash emet des FAITS sur chaque evenement isole (ECS-based).
# Il ne calcule AUCUN : score composite, verdict MITRE, compteur de fenetre,
# correlation cross-source, ni label d'entrainement. Tout cela est deplace
# cote Python (ou agregations Elasticsearch), ou les fenetres sont correctes,
# reproductibles, et non bridees par pipeline.workers: 1.
#
# Sortie : champs [ml][...] factuels + champs ECS bruts conserves
# (process.*, file.*, source.*) que le job Python lira pour calculer
# comptages, nouveaute, n-grammes, deltas et fenetres.
# =============================================================================

filter {

  # ===========================================================================
  # 1. ROUTAGE — identifier la source (ECS, par evenement)
  #    log_source reste une STRING. On NE l'encode PAS en 0/1/2 : un ordinal
  #    impliquerait un ordre syslog < auth < auditd, faux pour le modele.
  #    Le one-hot encoding se fait cote Python.
  # ===========================================================================
  ruby {
    code => '
      ds    = event.get("[event][dataset]") || ""
      agent = event.get("[agent][type]")    || ""
      src = if    ds == "system.syslog" then "syslog"
            elsif ds == "system.auth"   then "auth"
            elsif agent == "auditbeat" || ds.start_with?("auditd") then "auditd"
            else "unknown" end
      event.set("[ml][log_source]", src)
    '
  }
  if [ml][log_source] == "unknown" { drop { } }

  # ===========================================================================
  # 2. TEMPS — encodage cyclique + drapeaux hors-heures (par evenement)
  #    Strict minimum non redondant : sin/cos (cyclique), is_night, is_weekend.
  #    RETIRES : hour_of_day / day_of_week bruts (ordre lineaire trompeur),
  #    is_off_hours (doublon d is_night), is_business (redondant).
  #    NB : la fenetre Python recalcule une heure representative ; ces champs
  #    restent utiles pour Kibana et comme repli.
  # ===========================================================================
  ruby {
    code => '
      t = event.get("@timestamp")
      if t
        h = t.time.hour
        w = t.time.wday
        event.set("[ml][hour_sin]",   Math.sin(2 * Math::PI * h / 24.0).round(4))
        event.set("[ml][hour_cos]",   Math.cos(2 * Math::PI * h / 24.0).round(4))
        event.set("[ml][is_night]",   (h >= 22 || h < 6) ? 1 : 0)
        event.set("[ml][is_weekend]", (w == 0 || w == 6) ? 1 : 0)
      end
    '
  }

  # ===========================================================================
  # 3. FORME DU MESSAGE — signaux NEUTRES par evenement (comportement, pas verdict)
  #    Longueur, nombre de mots, et drapeaux factuels bon marche.
  #    RETIRE : msg_has_base64 (regex trop large -> hashs, tokens et IDs de
  #    session legitimes matchent => faux positifs). L entropie auditd (sect.6)
  #    capte l obfuscation de maniere plus fiable.
  #    RETIRE : user_sensitivity ordinal (3/2/1/0 = jugement) -> on garde
  #    seulement is_root, factuel.
  # ===========================================================================
  ruby {
    code => '
      msg = (event.get("message") || "").downcase
      event.set("[ml][msg_length_log]", msg.length > 0 ? Math.log(1.0 + msg.length).round(4) : 0.0)
      event.set("[ml][msg_word_count]", msg.split.length)
      event.set("[ml][msg_has_ip]",   msg.match?(/\b\d{1,3}(\.\d{1,3}){3}\b/) ? 1 : 0)
      event.set("[ml][msg_has_url]",  (msg.include?("http://") || msg.include?("https://")) ? 1 : 0)
      event.set("[ml][msg_has_pipe]", msg.include?(" | ") ? 1 : 0)
      u = (event.get("[user][name]") || "").downcase
      event.set("[ml][is_root]", u == "root" ? 1 : 0)
    '
  }

  # ===========================================================================
  # 4. AUTH — FAITS uniquement (ECS), aucun score ni verdict
  #    On emet : la categorie d evenement (= le "template"), l issue, et le
  #    contexte reseau factuel. On s appuie sur event.action / event.outcome
  #    ECS, PAS sur le matching de sous-chaines du message (fragile, dependant
  #    du format/locale). Tous les compteurs (brute force, enum, stuffing) et
  #    les correlations (ssh->sudo, bruteforce->success) PARTENT cote Python.
  # ===========================================================================
  if [ml][log_source] == "auth" {

    # 4.1 — IP source : champ ECS, sinon extraction de secours depuis message
    if ![source][ip] and [source][address] and [source][address] != "" {
      mutate { copy => { "[source][address]" => "[source][ip]" } }
    }
    if ![source][ip] or [source][ip] == "" {
      grok {
        match          => { "message" => ["from %{IP:_sip}", "rhost=%{IP:_sip}"] }
        tag_on_failure => []
      }
      if [_sip] and [_sip] != "" {
        mutate { copy => { "_sip" => "[source][ip]" } remove_field => ["_sip"] }
      }
    }

    # 4.2 — GeoIP : la SEULE chose qui doit etre ici (besoin de la base IP)
    if [source][ip] and [source][ip] != "" {
      geoip {
        source         => "[source][ip]"
        target         => "[source][geo]"
        fields         => ["COUNTRY_CODE2"]
        tag_on_failure => ["_geoip_fail"]
      }
    }

    # 4.3 — Template (categorie) + issue + contexte reseau, depuis ECS
    ruby {
      code => '
        prog   = (event.get("[process][name]")  || "").downcase
        action = (event.get("[event][action]")  || "").downcase
        et = if    !action.empty?      then action
             elsif prog == "sshd"      then "ssh"
             elsif prog == "sudo"      then "sudo"
             elsif prog == "su"        then "su"
             elsif prog == "passwd"    then "passwd"
             else (prog.empty? ? "other" : prog) end
        event.set("[ml][event_type]", et)
        event.set("[ml][outcome]",    (event.get("[event][outcome]") || "unknown").downcase)

        ip  = (event.get("[source][ip]") || "")
        ext = 0
        if !ip.empty? && ip != "::1"
          priv = ip.start_with?("127.", "10.", "192.168.") ||
                 (ip.start_with?("172.") && ip.split(".")[1].to_i.between?(16, 31))
          ext = priv ? 0 : 1
        end
        event.set("[ml][ip_is_external]", ext)
        event.set("[ml][geo_country]",    (event.get("[source][geo][country_iso_code]") || "unknown"))
      '
    }
  }

  # ===========================================================================
  # 5. SYSLOG — categorie de sous-systeme + severite (faits)
  #    event_type = la categorie du programme (= un "template"), combinee a
  #    event.action ECS si disponible. severity depuis log.level (ECS).
  #    RETIRES : tous les flags MITRE (module_load, lateral_ssh, log_tamper,
  #    new_service, high_cpu/cryptominer...) — ce sont des verdicts a base de
  #    regex sur le message. Le comptage des categories cote Python suffit.
  # ===========================================================================
  if [ml][log_source] == "syslog" {
    ruby {
      code => '
        prog   = (event.get("[process][name]") || "").downcase
        action = (event.get("[event][action]") || "").downcase
        cat = case prog
          when "kernel"                                       then "kernel"
          when "cron", "crond", "anacron"                     then "scheduler"
          when "systemd", "systemd-logind", "systemd-udevd"   then "init"
          when "networkmanager", "dhclient", "dhcpcd",
               "wpa_supplicant"                               then "network"
          when "sshd", "sshguard"                             then "ssh"
          else "other" end
        event.set("[ml][event_type]", action.empty? ? cat : (cat + ":" + action))
        event.set("[ml][outcome]",    (event.get("[event][outcome]") || "unknown").downcase)
        event.set("[ml][severity]",   (event.get("[log][level]")     || "info").downcase)
      '
    }
  }

  # ===========================================================================
  # 6. AUDITD — categorie syscall + forme de commande (faits)
  #    On garde : event_type (depuis event.action, fin), syscall_category
  #    (coarse), l issue, et des SCALAIRES comportementaux par evenement :
  #    entropie de la commande, longueur, nb d arguments.
  #    Les champs process.executable / process.parent.executable / file.path
  #    restent BRUTS (ECS) -> Python calcule nouveaute (binaire/lignee jamais
  #    vus) et acces sensibles.
  #    RETIRES : tous les patterns MITRE (reverse_shell, credential_access,
  #    ssh_key_implant, cron_backdoor, suid_abuse, ld_hijack, cryptominer,
  #    log_delete, network_scan, exfiltration, suspicious_combo) et aud_severity.
  #    Ce sont des verdicts de regles, pas des features pour l AE.
  # ===========================================================================
  if [ml][log_source] == "auditd" {
    ruby {
      code => '
        syscall = (event.get("[auditd][data][syscall]") || "").downcase
        action  = (event.get("[event][action]")         || "").downcase
        cat = case syscall
          when "execve", "execveat"                          then "exec"
          when "open", "openat", "openat2", "read", "write",
               "unlink", "unlinkat", "rename", "renameat",
               "chmod", "chown", "truncate", "ftruncate"     then "file"
          when "connect", "bind", "accept", "accept4",
               "socket", "sendto", "recvfrom", "listen"      then "network"
          when "ptrace"                                      then "ptrace"
          when "init_module", "finit_module", "delete_module" then "module"
          when "kill", "tkill", "tgkill"                     then "signal"
          when "clone", "fork", "vfork", "clone3"            then "process"
          when "mprotect", "mmap", "mmap2"                   then "memory"
          else "other" end
        event.set("[ml][syscall_category]", cat)
        event.set("[ml][event_type]", action.empty? ? cat : action)
        event.set("[ml][outcome]",    (event.get("[event][outcome]") || "unknown").downcase)

        # Reconstitution de la commande depuis ECS / auditd
        raw  = event.get("[process][args]")
        args = raw.is_a?(Array) ? raw.join(" ").downcase : raw.to_s.downcase
        args = (event.get("[auditd][data][cmdline]") || "").downcase if args.empty?
        exe  = (event.get("[process][executable]")   || "").downcase
        cmd  = args.empty? ? exe : args

        event.set("[ml][cmd_length_log]", cmd.length > 0 ? Math.log(1.0 + cmd.length).round(4) : 0.0)
        event.set("[ml][arg_count]",      raw.is_a?(Array) ? raw.length : args.split.length)

        # Entropie de Shannon : mesure de desordre de la commande (scalaire
        # continu), PAS un seuil binaire d obfuscation. Python pourra agreger
        # le max/mean par fenetre.
        ent = 0.0
        if cmd.length > 0
          freq = Hash.new(0)
          cmd.each_char { |c| freq[c] += 1 }
          freq.each_value { |n| p = n.to_f / cmd.length; ent -= p * Math.log2(p) }
        end
        event.set("[ml][cmd_entropy]", ent.round(4))
      '
    }
  }

  # ===========================================================================
  # 7. CONVERSIONS DE TYPES — uniquement les champs ml.* numeriques emis
  #    Pas de gros bloc de zero-padding cross-source : chaque evenement ne
  #    porte que les champs de SA source. Le job Python gere les champs
  #    absents avec des valeurs par defaut (0 / absent).
  # ===========================================================================
  mutate {
    convert => {
      "[ml][hour_sin]"        => "float"
      "[ml][hour_cos]"        => "float"
      "[ml][is_night]"        => "integer"
      "[ml][is_weekend]"      => "integer"
      "[ml][msg_length_log]"  => "float"
      "[ml][msg_word_count]"  => "integer"
      "[ml][msg_has_ip]"      => "integer"
      "[ml][msg_has_url]"     => "integer"
      "[ml][msg_has_pipe]"    => "integer"
      "[ml][is_root]"         => "integer"
      "[ml][ip_is_external]"  => "integer"
      "[ml][cmd_length_log]"  => "float"
      "[ml][arg_count]"       => "integer"
      "[ml][cmd_entropy]"     => "float"
    }
  }

  # ===========================================================================
  # 8. NETTOYAGE — champs internes / redondants
  #    On CONSERVE process.*, file.*, source.* (ECS) : le job Python les lit
  #    pour la nouveaute, la lignee de processus et les acces sensibles.
  # ===========================================================================
  mutate {
    remove_field => [
      "[agent][ephemeral_id]",
      "[log][offset]",
      "[event][original]",
      "[ecs][version]",
      "_geoip_fail"
    ]
  }
}
# =============================================================================
# OUTPUT — ROUTING VERS ELASTICSEARCH
# =============================================================================

output {
  # Auditbeat → index dédié auditbeat-YYYY.MM.dd
  if [agent][type] == "auditbeat" {
    elasticsearch {
      hosts    => ["https://elasticsearch:9200"]
      user     => "logstash_writer"
      password => "${LOGSTASH_WRITER_PWD}"
      index    => "auditbeat-%{+YYYY.MM.dd}"
      ssl_enabled => true
      ssl_certificate => "/usr/share/logstash/config/certs/elk/logstash-client/logstash-client.crt"
      ssl_key         => "/usr/share/logstash/config/certs/elk/logstash-client/logstash-client.key"
      ssl_certificate_authorities => ["/usr/share/logstash/config/certs/full-chain.crt"]
      ssl_verification_mode => "full"
    }
  }

  # Filebeat (module system) → index filebeat-logs-YYYY.MM.dd
  else if [agent][type] == "filebeat" {
    elasticsearch {
      hosts    => ["https://elasticsearch:9200"]
      user     => "logstash_writer"
      password => "${LOGSTASH_WRITER_PWD}"
      index    => "filebeat-logs-%{+YYYY.MM.dd}"
      pipeline => "%{[@metadata][pipeline]}"
      ssl_enabled => true
      ssl_certificate => "/usr/share/logstash/config/certs/elk/logstash-client/logstash-client.crt"
      ssl_key         => "/usr/share/logstash/config/certs/elk/logstash-client/logstash-client.key"
      ssl_certificate_authorities => ["/usr/share/logstash/config/certs/full-chain.crt"]
      ssl_verification_mode => "full"
    }
  }

  # Debug console (à désactiver en production)
  stdout { codec => rubydebug }
}