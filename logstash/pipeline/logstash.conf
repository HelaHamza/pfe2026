  # ===========================================================================
  # SECTION 7 — DELTA TEMPS PAR HOST ET SOURCE
  # ---------------------------------------------------------------------------
  # But : mesurer l'intervalle entre deux événements consécutifs du même host.
  # Un burst soudain d'events (delta_time très petit) peut indiquer une attaque
  # automatisée (brute force, scan, exfil).
  #
  # delta_time     : secondes depuis le dernier event (même host, même source)
  # delta_time_log : log(1 + delta) — normalise les grandes valeurs
  # Exemple : delta=0.1s → event toutes les 100ms = probablement automatisé
  # ===========================================================================

  if [host][name] and [host][name] != "" {
    aggregate {
      task_id => "delta_%{[host][name]}_%{[ml][log_source]}"
      code    => "
        last = map['last']
        now  = event.get('@timestamp').to_f
        if last
          delta = (now - last).abs
          event.set('[ml][delta_time]',     delta.round(4))
          event.set('[ml][delta_time_log]', Math.log(1.0 + delta).round(4))
        else
          event.set('[ml][delta_time]',     0.0)
          event.set('[ml][delta_time_log]', 0.0)
        end
        map['last'] = now
      "
      timeout => 600
    }
  }

  if ![ml][delta_time] {
    mutate {
      add_field => {
        "[ml][delta_time]"     => "0.0"
        "[ml][delta_time_log]" => "0.0"
      }
    }
  }

  mutate {
    convert => {
      "[ml][delta_time]"     => "float"
      "[ml][delta_time_log]" => "float"
    }
  }


  # ===========================================================================
  # SECTION 8 — CROSS-SOURCE CORRELATION
  # ---------------------------------------------------------------------------
  # But : détecter quand un même host génère des événements sur plusieurs
  # sources différentes dans une fenêtre de 5 minutes.
  # Un seul host qui produit simultanément auth + auditd + syslog = activité
  # inhabituelle pouvant indiquer une intrusion en cours.
  #
  # cross_multi_source : 1 si ≥2 sources distinctes détectées en 5min
  # ===========================================================================

  if [host][name] and [host][name] != "" {
    aggregate {
      task_id => "cross_src_%{[host][name]}"
      code    => "
        map['sources'] ||= {}
        map['win_ts']  ||= event.get('@timestamp').to_f

        src = event.get('[ml][log_source]') || 'unknown'
        now = event.get('@timestamp').to_f

        if (now - map['win_ts']) > 300
          map['sources'] = {}
          map['win_ts']  = now
        end

        map['sources'][src] = now
        has_multi = (map['sources'].keys & ['auth', 'auditd', 'syslog']).length >= 2 ? 1 : 0
        event.set('[ml][cross_multi_source]', has_multi)
      "
      timeout => 300
    }
  }

  if ![ml][cross_multi_source] {
    mutate { add_field => { "[ml][cross_multi_source]" => 0 } }
  }
  mutate { convert => { "[ml][cross_multi_source]" => "integer" } }


  # ===========================================================================
  # SECTION 9 — FRÉQUENCE PAR IP (fenêtres 1min et 5min)
  # ---------------------------------------------------------------------------
  # But : compter le nombre d'events par IP source dans des fenêtres glissantes.
  # Un burst de requêtes depuis la même IP = scan ou attaque automatisée.
  #
  # event_count_ip      : compteur total depuis le début
  # event_count_1m_ip   : events dans la dernière minute
  # event_count_5m_ip   : events dans les 5 dernières minutes
  # freq_spike_ratio    : ratio events_1m / total (spike soudain)
  # freq_spike_ratio_5m : ratio events_5m / total
  # ===========================================================================

  if [source][ip] and [source][ip] != "" {
    aggregate {
      task_id => "freq_ip_%{[source][ip]}"
      code    => "
        map['count']    ||= 0
        map['count_1m'] ||= 0
        map['count_5m'] ||= 0
        map['win1_ts']  ||= event.get('@timestamp').to_f
        map['win5_ts']  ||= event.get('@timestamp').to_f

        map['count'] += 1
        now = event.get('@timestamp').to_f

        if (now - map['win1_ts']) > 60
          map['count_1m'] = 1
          map['win1_ts']  = now
        else
          map['count_1m'] += 1
        end

        if (now - map['win5_ts']) > 300
          map['count_5m'] = 1
          map['win5_ts']  = now
        else
          map['count_5m'] += 1
        end

        ratio_1m = map['count'] > 0 ? (map['count_1m'].to_f / map['count']).round(4) : 0.0
        ratio_5m = map['count'] > 0 ? (map['count_5m'].to_f / map['count']).round(4) : 0.0

        event.set('[ml][event_count_ip]',      map['count'])
        event.set('[ml][event_count_1m_ip]',   map['count_1m'])
        event.set('[ml][event_count_5m_ip]',   map['count_5m'])
        event.set('[ml][freq_spike_ratio]',    ratio_1m)
        event.set('[ml][freq_spike_ratio_5m]', ratio_5m)
      "
      timeout => 600
    }
  }

  if ![ml][event_count_ip] {
    mutate {
      add_field => {
        "[ml][event_count_ip]"      => 0
        "[ml][event_count_1m_ip]"   => 0
        "[ml][event_count_5m_ip]"   => 0
        "[ml][freq_spike_ratio]"    => "0.0"
        "[ml][freq_spike_ratio_5m]" => "0.0"
      }
    }
  }

  mutate {
    convert => {
      "[ml][event_count_ip]"      => "integer"
      "[ml][event_count_1m_ip]"   => "integer"
      "[ml][event_count_5m_ip]"   => "integer"
      "[ml][freq_spike_ratio]"    => "float"
      "[ml][freq_spike_ratio_5m]" => "float"
    }
  }


  # ===========================================================================
  # SECTION 10 — AMÉLIORATIONS : 3 nouvelles features
  # ---------------------------------------------------------------------------
  # Ces features comblent les angles morts identifiés dans l'analyse :
  #
  # unique_hosts_accessed : nb de machines différentes touchées par un user
  #                         en 10min → mouvement latéral (T1021)
  # is_lateral_movement   : 1 si ≥3 machines en 10min
  # geo_distance          : 0=pays connu, 2=pays inconnu → connexion suspecte
  # aud_suspicious_combo  : combinaison d'arguments suspects sans pattern exact
  #                         (wget+chmod, pipe vers shell, /tmp+chmod, base64+eval)
  # ===========================================================================

  ruby {
    code => "
      # geo_distance : pénalise les connexions depuis des pays inconnus
      country  = (event.get('[ml][auth_source_country]') || 'unknown').upcase
      known    = ['TN', 'FR', 'DE']
      geo_dist = known.include?(country) ? 0 : (country == 'unknown' ? 0 : 2)
      event.set('[ml][geo_distance]', geo_dist)

      # aud_suspicious_combo : combinaisons de comportements suspects
      raw  = event.get('[process][args]')
      args = raw.is_a?(Array) ? raw.join(' ').downcase : raw.to_s.downcase
      exe  = (event.get('[process][executable]') || '').downcase

      combo = 0
      combo = 1 if (args.include?('wget') || args.include?('curl')) &&
                    args.include?('chmod')
      combo = 1 if args.match?(/\|\s*(bash|sh|zsh|python|perl|ruby)/)
      combo = 1 if args.include?('/tmp/') && args.include?('chmod')
      combo = 1 if args.include?('base64') && args.include?('eval')
      event.set('[ml][aud_suspicious_combo]', combo)
    "
  }

  # unique_hosts_accessed : agrégat par user sur 10min
  # Détecte un user qui saute de machine en machine (pivot)
  if [user][name] and [user][name] != "" {
    aggregate {
      task_id => "hosts_%{[user][name]}"
      code    => "
        map['hosts']  ||= {}
        map['win_ts'] ||= event.get('@timestamp').to_f

        host = event.get('[host][name]') || 'unknown'
        now  = event.get('@timestamp').to_f

        if (now - map['win_ts']) > 600
          map['hosts']  = {}
          map['win_ts'] = now
        end

        map['hosts'][host] = 1
        unique_count = map['hosts'].keys.length

        event.set('[ml][unique_hosts_accessed]', unique_count)
        event.set('[ml][is_lateral_movement]',   unique_count >= 3 ? 1 : 0)
      "
      timeout => 600
    }
  }

  if ![ml][unique_hosts_accessed] {
    mutate {
      add_field => {
        "[ml][unique_hosts_accessed]" => 0
        "[ml][is_lateral_movement]"   => 0
        "[ml][geo_distance]"          => 0
        "[ml][aud_suspicious_combo]"  => 0
      }
    }
  }

  mutate {
    convert => {
      "[ml][unique_hosts_accessed]" => "integer"
      "[ml][is_lateral_movement]"   => "integer"
      "[ml][geo_distance]"          => "integer"
      "[ml][aud_suspicious_combo]"  => "integer"
    }
  }


  # ===========================================================================
  # SECTION 11 — SCORE COMPOSITE FINAL
  # ---------------------------------------------------------------------------
  # But : agréger tous les signaux en un score de priorité unique.
  # Ce score est utilisé pour :
  #   1. Les dashboards Kibana (visualisation directe)
  #   2. Le filtre is_normal_candidate (Section 12)
  #   3. La colonne priority_label (low/medium/high/critical)
  #
  # IMPORTANT : NE PAS inclure composite_score comme feature ML
  # (il est calculé à partir des autres features → fuite de données)
  #
  # Seuils priority_label :
  #   critical : ≥18  (reverse shell, injection active)
  #   high     : ≥10  (brute force réussi, credential access)
  #   medium   : ≥4   (tentatives suspectes)
  #   low      : <4   (activité normale ou bruit)
  # ===========================================================================

  ruby {
    code => "
      src = event.get('[ml][log_source]') || 'unknown'

      base = case src
        when 'auth'   then event.get('[ml][auth_severity]').to_i
        when 'syslog'
          s = 0
          s += 3 if event.get('[ml][sys_module_load]').to_i        == 1
          s += 2 if event.get('[ml][sys_firewall_change]').to_i    == 1
          s += 2 if event.get('[ml][sys_oom_kill]').to_i           == 1
          s += 1 if event.get('[ml][sys_service_crash_loop]').to_i == 1
          s
        when 'auditd' then event.get('[ml][aud_severity]').to_i
        else 0
      end

      bonus = 0
      bonus += 3 if event.get('[ml][auth_is_brute_force]').to_i      == 1
      bonus += 2 if event.get('[ml][auth_is_slow_bruteforce]').to_i  == 1
      bonus += 2 if event.get('[ml][auth_is_stuffing]').to_i         == 1
      bonus += 1 if event.get('[ml][auth_is_user_enum]').to_i        == 1
      bonus += 3 if event.get('[ml][cross_ssh_then_sudo]').to_i      == 1
      bonus += 3 if event.get('[ml][cross_bruteforce_success]').to_i == 1
      bonus += 3 if event.get('[ml][aud_process_injection]').to_i    == 1
      bonus += 2 if event.get('[ml][aud_cmd_is_obfuscated]').to_i    == 1
      bonus += 2 if event.get('[ml][is_off_hours]').to_i             == 1
      bonus += 2 if event.get('[ml][is_root]').to_i                  == 1
      bonus += 2 if event.get('[ml][msg_has_base64]').to_i           == 1
      bonus += 1 if event.get('[ml][is_weekend]').to_i               == 1
      bonus += 5 if event.get('[ml][aud_reverse_shell]').to_i        == 1
      bonus += 4 if event.get('[ml][aud_ld_hijack]').to_i            == 1
      bonus += 4 if event.get('[ml][aud_credential_access]').to_i    == 1
      bonus += 3 if event.get('[ml][aud_ssh_key_implant]').to_i      == 1
      bonus += 3 if event.get('[ml][aud_log_delete]').to_i           == 1
      bonus += 2 if event.get('[ml][aud_cron_backdoor]').to_i        == 1
      bonus += 2 if event.get('[ml][aud_suid_abuse]').to_i           == 1
      bonus += 2 if event.get('[ml][aud_exfiltration]').to_i         == 1
      bonus += 1 if event.get('[ml][aud_network_scan]').to_i         == 1
      bonus += 1 if event.get('[ml][aud_cryptominer]').to_i          == 1
      bonus += 2 if event.get('[ml][sys_new_service]').to_i          == 1
      bonus += 2 if event.get('[ml][sys_log_tamper]').to_i           == 1
      bonus += 1 if event.get('[ml][sys_lateral_ssh]').to_i          == 1
      bonus += 1 if event.get('[ml][sys_high_cpu_process]').to_i     == 1
      # Nouveaux bonus (Section 10)
      bonus += 2 if event.get('[ml][is_lateral_movement]').to_i      == 1
      bonus += 2 if event.get('[ml][geo_distance]').to_i             >= 2
      bonus += 1 if event.get('[ml][aud_suspicious_combo]').to_i     == 1

      raw = base + bonus

      event.set('[ml][composite_score]',      raw)
      event.set('[ml][composite_score_norm]', [raw / 30.0, 1.0].min.round(4))
      event.set('[ml][is_anomaly_candidate]', raw >= 4 ? 1 : 0)

      priority = if raw >= 18   then 'critical'
                elsif raw >= 10 then 'high'
                elsif raw >= 4  then 'medium'
                else                 'low'
                end
      event.set('[ml][priority_label]', priority)
    "
  }


  # ===========================================================================
  # SECTION 12 — IS_NORMAL_CANDIDATE (masque pour entraînement ML)
  # ---------------------------------------------------------------------------
  # But : étiqueter chaque log comme "candidat normal" pour l'entraînement.
  # Ce champ remplace l'ancien filtre Python "composite_score < 2" qui était
  # fragile et calculé après coup.
  #
  # Logique (4 critères en AND) :
  #   C1 — composite_score < 2      : pas de signal d'alerte connu
  #   C2 — heures ouvrables (8h-18h): activité normale de journée
  #   C3 — jour ouvrable (lun-ven)  : pas de weekend
  #   C4 — aucun flag d'attaque     : aucune feature binaire d'attaque à 1
  #
  # Un log DOIT passer les 4 critères pour is_normal_candidate=1.
  # normal_reject_reason : indique lequel des critères a rejeté le log.
  #
  # Utilisation en Python :
  #   normal_mask = df["is_normal_candidate"] == 1
  #   df_train = df[normal_mask]   # entraînement uniquement sur ces logs
  # ===========================================================================

  ruby {
    code => "
      score = event.get('[ml][composite_score]').to_i
      hour  = event.get('[ml][hour_of_day]').to_i
      dow   = event.get('[ml][day_of_week]').to_i

      c1 = score < 2
      c2 = (hour >= 8 && hour <= 18)
      c3 = (dow >= 1 && dow <= 5)

      attack_flags = [
        '[ml][aud_reverse_shell]',    '[ml][aud_process_injection]',
        '[ml][aud_log_delete]',       '[ml][aud_credential_access]',
        '[ml][aud_ssh_key_implant]',  '[ml][auth_is_brute_force]',
        '[ml][auth_is_stuffing]',     '[ml][cross_bruteforce_success]',
        '[ml][sys_log_tamper]',       '[ml][sys_module_load]',
        '[ml][is_lateral_movement]',  '[ml][aud_suspicious_combo]'
      ]
      c4 = attack_flags.all? { |f| event.get(f).to_i == 0 }

      is_normal = (c1 && c2 && c3 && c4) ? 1 : 0
      event.set('[ml][is_normal_candidate]', is_normal)

      reason = if    !c1 then 'score_high'
               elsif !c2 then 'off_hours'
               elsif !c3 then 'weekend'
               elsif !c4 then 'attack_flag'
               else           'none'
               end
      event.set('[ml][normal_reject_reason]', reason)
    "
  }

  mutate {
    convert => { "[ml][is_normal_candidate]" => "integer" }
  }


  # ===========================================================================
  # SECTION 13 — CONVERSION FINALE DES TYPES
  # ---------------------------------------------------------------------------
  # But : garantir que tous les champs ml.* sont du bon type dans ES.
  # Sans cette section, des valeurs string "0" seraient indexées comme keyword
  # et le modèle ML ne pourrait pas les utiliser comme numériques.
  # ===========================================================================

  mutate {
    convert => {
      "[ml][log_source_encoded]"      => "integer"
      "[ml][hour_of_day]"             => "integer"
      "[ml][day_of_week]"             => "integer"
      "[ml][is_off_hours]"            => "integer"
      "[ml][is_night]"                => "integer"
      "[ml][is_weekend]"              => "integer"
      "[ml][is_business]"             => "integer"
      "[ml][hour_sin]"                => "float"
      "[ml][hour_cos]"                => "float"
      "[ml][msg_length_log]"          => "float"
      "[ml][msg_word_count]"          => "integer"
      "[ml][msg_has_ip]"              => "integer"
      "[ml][msg_has_base64]"          => "integer"
      "[ml][msg_has_url]"             => "integer"
      "[ml][msg_has_pipe]"            => "integer"
      "[ml][user_sensitivity]"        => "integer"
      "[ml][is_root]"                 => "integer"
      "[ml][auth_is_root]"            => "integer"
      "[ml][auth_ip_is_external]"     => "integer"
      "[ml][auth_severity]"           => "integer"
      "[ml][auth_sev_norm]"           => "float"
      "[ml][auth_user_sensitivity]"   => "integer"
      "[ml][auth_user_created]"       => "integer"
      "[ml][auth_user_deleted]"       => "integer"
      "[ml][auth_sudo_to_root]"       => "integer"
      "[ml][auth_passwd_changed]"     => "integer"
      "[ml][auth_pam_open]"           => "integer"
      "[ml][auth_pam_close]"          => "integer"
      "[ml][auth_known_country]"      => "integer"
      "[ml][auth_fail_count_5m]"      => "integer"
      "[ml][auth_fail_window_10m]"    => "integer"
      "[ml][auth_ok_count_5m]"        => "integer"
      "[ml][auth_fail_ratio]"         => "float"
      "[ml][auth_users_tried]"        => "integer"
      "[ml][unique_users_per_ip]"     => "integer"
      "[ml][auth_is_brute_force]"     => "integer"
      "[ml][auth_is_slow_bruteforce]" => "integer"
      "[ml][auth_is_user_enum]"       => "integer"
      "[ml][auth_is_stuffing]"        => "integer"
      "[ml][session_duration]"        => "float"
      "[ml][session_duration_log]"    => "float"
      "[ml][cross_ssh_then_sudo]"     => "integer"
      "[ml][cross_bruteforce_success]"=> "integer"
      "[ml][cross_multi_source]"      => "integer"
      "[ml][sys_oom_kill]"            => "integer"
      "[ml][sys_module_load]"         => "integer"
      "[ml][sys_cron_new_job]"        => "integer"
      "[ml][sys_firewall_change]"     => "integer"
      "[ml][sys_service_crash_loop]"  => "integer"
      "[ml][sys_msg_length_log]"      => "float"
      "[ml][sys_lateral_ssh]"         => "integer"
      "[ml][sys_new_service]"         => "integer"
      "[ml][sys_log_tamper]"          => "integer"
      "[ml][sys_high_cpu_process]"    => "integer"
      "[ml][aud_severity]"            => "integer"
      "[ml][aud_sev_norm]"            => "float"
      "[ml][aud_ptrace]"              => "integer"
      "[ml][aud_process_injection]"   => "integer"
      "[ml][aud_log_tamper]"          => "integer"
      "[ml][aud_cmd_entropy]"         => "float"
      "[ml][aud_cmd_length_log]"      => "float"
      "[ml][aud_cmd_is_obfuscated]"   => "integer"
      "[ml][aud_arg_count]"           => "integer"
      "[ml][payload_size_log]"        => "float"
      "[ml][aud_reverse_shell]"       => "integer"
      "[ml][aud_cron_backdoor]"       => "integer"
      "[ml][aud_suid_abuse]"          => "integer"
      "[ml][aud_ld_hijack]"           => "integer"
      "[ml][aud_credential_access]"   => "integer"
      "[ml][aud_ssh_key_implant]"     => "integer"
      "[ml][aud_cryptominer]"         => "integer"
      "[ml][aud_log_delete]"          => "integer"
      "[ml][aud_network_scan]"        => "integer"
      "[ml][aud_exfiltration]"        => "integer"
      "[ml][delta_time]"              => "float"
      "[ml][delta_time_log]"          => "float"
      "[ml][event_count_ip]"          => "integer"
      "[ml][event_count_1m_ip]"       => "integer"
      "[ml][event_count_5m_ip]"       => "integer"
      "[ml][freq_spike_ratio]"        => "float"
      "[ml][freq_spike_ratio_5m]"     => "float"
      "[ml][composite_score]"         => "integer"
      "[ml][composite_score_norm]"    => "float"
      "[ml][is_anomaly_candidate]"    => "integer"
      "[ml][unique_hosts_accessed]"   => "integer"
      "[ml][is_lateral_movement]"     => "integer"
      "[ml][geo_distance]"            => "integer"
      "[ml][aud_suspicious_combo]"    => "integer"
      "[ml][is_normal_candidate]"     => "integer"
    }
  }


  # ===========================================================================
  # SECTION 14 — NETTOYAGE
  # ---------------------------------------------------------------------------
  # But : supprimer les champs inutiles pour réduire la taille des documents ES.
  # Ces champs sont soit internes à l'agent, soit redondants.
  # ===========================================================================

  mutate {
    remove_field => [
      "[agent][ephemeral_id]",
      "[log][offset]",
      "[event][original]",
      "[ecs][version]",
      "_geoip_lookup_failure"
    ]
  }

}


# =============================================================================
# OUTPUT — ROUTING VERS ELASTICSEARCH
# =============================================================================

output {
  # Auditbeat → index dédié auditbeat-YYYY.MM.dd
  if [agent][type] == "auditbeat" {
    elasticsearch {
      hosts    => ["https://elasticsearch:9200"]
      user     => "logstash_writer"
      password => "${LOGSTASH_WRITER_PWD}"
      index    => "auditbeat-%{+YYYY.MM.dd}"
      ssl_enabled => true
      ssl_certificate => "/usr/share/logstash/config/certs/elk/logstash-client/logstash-client.crt"
      ssl_key         => "/usr/share/logstash/config/certs/elk/logstash-client/logstash-client.key"
      ssl_certificate_authorities => ["/usr/share/logstash/config/certs/full-chain.crt"]
      ssl_verification_mode => "full"
    }
  }

  # Filebeat (module system) → index filebeat-logs-YYYY.MM.dd
  else if [agent][type] == "filebeat" {
    elasticsearch {
      hosts    => ["https://elasticsearch:9200"]
      user     => "logstash_writer"
      password => "${LOGSTASH_WRITER_PWD}"
      index    => "filebeat-logs-%{+YYYY.MM.dd}"
      pipeline => "%{[@metadata][pipeline]}"
      ssl_enabled => true
      ssl_certificate => "/usr/share/logstash/config/certs/elk/logstash-client/logstash-client.crt"
      ssl_key         => "/usr/share/logstash/config/certs/elk/logstash-client/logstash-client.key"
      ssl_certificate_authorities => ["/usr/share/logstash/config/certs/full-chain.crt"]
      ssl_verification_mode => "full"
    }
  }

  # Debug console (à désactiver en production)
  stdout { codec => rubydebug }
}