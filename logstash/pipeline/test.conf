input {
  stdin {}
}

filter {

  # ROUTING : audit.log detecte par chemin Filebeat OU pattern message (stdin)
  if ([log][file][path] =~ "audit\.log") or
     ([message] =~ "^\s*type=[A-Z_]+ msg=audit\(") {

    # ETAPE 1 : extraire type et epoch
    grok {
      match => {
        "message" => "\s*type=%{WORD:[event][action]} msg=audit\(%{NUMBER:[event][epoch]}:%{NUMBER}\):\s*%{GREEDYDATA:audit_msg}"
      }
      tag_on_failure => ["_grok_auditd_failure"]
    }

    # ETAPE 2 : parser les paires cle=valeur
    # trim_value supprime les guillemets : comm="ls" devient ls
    kv {
      source                 => "audit_msg"
      field_split            => " "
      value_split            => "="
      target                 => "auditd_kv"
      trim_value             => '"'
      allow_duplicate_values => false
    }

    # ETAPE 3 : mapping ECS
    if [auditd_kv][uid]     { mutate { add_field => { "[user][id]"              => "%{[auditd_kv][uid]}"     } } }
    if [auditd_kv][euid]    { mutate { add_field => { "[user][effective][id]"   => "%{[auditd_kv][euid]}"    } } }
    if [auditd_kv][auid]    { mutate { add_field => { "[user][audit][id]"       => "%{[auditd_kv][auid]}"    } } }
    if [auditd_kv][exe]     { mutate { add_field => { "[process][executable]"   => "%{[auditd_kv][exe]}"     } } }
    if [auditd_kv][comm]    { mutate { add_field => { "[process][name]"         => "%{[auditd_kv][comm]}"    } } }
    if [auditd_kv][pid]     { mutate { add_field => { "[process][pid]"          => "%{[auditd_kv][pid]}"     } } }
    if [auditd_kv][ppid]    { mutate { add_field => { "[process][parent][pid]"  => "%{[auditd_kv][ppid]}"    } } }
    if [auditd_kv][syscall] { mutate { add_field => { "[auditd][data][syscall]" => "%{[auditd_kv][syscall]}" } } }
    if [auditd_kv][key]     { mutate { add_field => { "[auditd][data][key]"     => "%{[auditd_kv][key]}"     } } }
    if [auditd_kv][exit]    { mutate { add_field => { "[auditd][data][exit]"    => "%{[auditd_kv][exit]}"    } } }
    if [auditd_kv][success] { mutate { add_field => { "[auditd][data][success]" => "%{[auditd_kv][success]}" } } }
    if [auditd_kv][arch]    { mutate { add_field => { "[auditd][data][arch]"    => "%{[auditd_kv][arch]}"    } } }
    if [auditd_kv][tty]     { mutate { add_field => { "[auditd][data][tty]"     => "%{[auditd_kv][tty]}"     } } }
    if [auditd_kv][ses]     { mutate { add_field => { "[auditd][data][ses]"     => "%{[auditd_kv][ses]}"     } } }
    if [auditd_kv][name]    { mutate { add_field => { "[file][path]"            => "%{[auditd_kv][name]}"    } } }
    if [auditd_kv][daddr]   { mutate { add_field => { "[destination][ip]"            => "%{[auditd_kv][daddr]}"   } } }
    if [auditd_kv][dport]   { mutate { add_field => { "[destination][port]"          => "%{[auditd_kv][dport]}"   } } }

    # Repertoire de travail (type=CWD ou champ cwd dans SYSCALL)
    if [auditd_kv][cwd]     { mutate { add_field => { "[process][working_directory]" => "%{[auditd_kv][cwd]}"     } } }

    # Arguments bruts a0..a3 (type=SYSCALL) - valeurs hexadecimales des registres
    if [auditd_kv][a0]      { mutate { add_field => { "[auditd][data][a0]"           => "%{[auditd_kv][a0]}"      } } }
    if [auditd_kv][a1]      { mutate { add_field => { "[auditd][data][a1]"           => "%{[auditd_kv][a1]}"      } } }
    if [auditd_kv][a2]      { mutate { add_field => { "[auditd][data][a2]"           => "%{[auditd_kv][a2]}"      } } }
    if [auditd_kv][a3]      { mutate { add_field => { "[auditd][data][a3]"           => "%{[auditd_kv][a3]}"      } } }

    # Arguments lisibles (type=EXECVE : a0="/bin/bash" a1="-c" a2="cmd")
    # Ces champs contiennent les vraies chaines de caracteres dechiffrees
    if [auditd_kv][a0]      { mutate { add_field => { "[process][args][0]"           => "%{[auditd_kv][a0]}"      } } }
    if [auditd_kv][a1]      { mutate { add_field => { "[process][args][1]"           => "%{[auditd_kv][a1]}"      } } }
    if [auditd_kv][a2]      { mutate { add_field => { "[process][args][2]"           => "%{[auditd_kv][a2]}"      } } }
    if [auditd_kv][a3]      { mutate { add_field => { "[process][args][3]"           => "%{[auditd_kv][a3]}"      } } }

    # ETAPE 4 : conversion types numeriques
    mutate {
      convert => {
        "[process][pid]"         => "integer"
        "[process][parent][pid]" => "integer"
        "[destination][port]"    => "integer"
      }
    }

    # ETAPE 5 : detection d'attaques

    # Privilege escalation : uid normal -> euid=0
    if [user][id] and [user][effective][id] == "0" and [user][id] != "0" {
      mutate {
        add_field => { "[custom][priv_esc_flag]" => "true" }
        add_tag   => ["priv_escalation"]
      }
    }

    # Ptrace : syscall 101 = injection memoire
    if [auditd][data][syscall] == "101" {
      mutate {
        add_field => { "[custom][ptrace_flag]" => "true" }
        add_tag   => ["ptrace_detected"]
      }
    }

    # Execution depuis /tmp ou /dev/shm (souvent malveillant)
    if [process][executable] =~ "^/tmp/|^/dev/shm/|^/var/tmp/" {
      mutate {
        add_field => { "[custom][suspicious_exec_path]" => "true" }
        add_tag   => ["suspicious_exec"]
      }
    }

    # Repertoire de travail suspect (commande lancee depuis /tmp, /var/www, etc.)
    if [process][working_directory] =~ "^/tmp|^/dev/shm|^/var/tmp|^/var/www" {
      mutate {
        add_field => { "[custom][suspicious_cwd]" => "true" }
        add_tag   => ["suspicious_cwd"]
      }
    }

    # ETAPE 6 : reconstruction process.args + features ML + risk_score
    ruby {
      code => '
        # --- Reconstruction process.args en liste lisible ---
        # Sur type=EXECVE : a0="/bin/bash" a1="-c" a2="wget http://..."
        # On assemble tous les ax presents en un tableau [arg0, arg1, ...]
        args = []
        [0, 1, 2, 3].each do |i|
          v = event.get("[process][args][#{i}]")
          args << v if v && !v.empty?
        end
        if args.length > 0
          # Liste pour Elasticsearch (array de strings)
          event.set("[process][args]", args)
          # Ligne de commande complete pour Sigma (CommandLine)
          event.set("[process][command_line]", args.join(" "))
        end

        # --- Features ML temporelles ---
        ts = event.get("@timestamp")
        if ts
          t = ts.time
          h = t.hour
          d = t.wday
          event.set("[custom][hour_of_day]",  h)
          event.set("[custom][day_of_week]",  d)
          event.set("[custom][is_off_hours]", h < 8 || h > 18)
          event.set("[custom][is_weekend]",   d == 0 || d == 6)
        end

        # --- Risk score ---
        score = 0
        score += 40 if event.get("[custom][priv_esc_flag]")        == "true"
        score += 35 if event.get("[custom][ptrace_flag]")          == "true"
        score += 25 if event.get("[custom][suspicious_exec_path]") == "true"
        score += 20 if event.get("[custom][suspicious_cwd]")       == "true"
        event.set("[custom][risk_score]", [score, 100].min)
      '
    }

    # ETAPE 7 : metadonnees ECS
    mutate {
      add_field => {
        "[event][module]"   => "auditd"
        "[event][category]" => "process"
        "[event][dataset]"  => "linux.audit"
      }
    }

    # ETAPE 8 : nettoyage
    mutate {
      remove_field => [
        "audit_msg",
        "auditd_kv",
        "message",
        "[event][original]",
        "[event][severity]",
        "[event][kind]",
        "[event][type]",
        "[event][risk_score]",
        "[event][risk_score_norm]",
        "[event][sequence]",
        "[event][hash]"
      ]
    }

  }

  # ECS version globale
  mutate {
    add_field => { "[ecs][version]" => "8.12.0" }
  }

}

output {
  stdout { codec => rubydebug }
}