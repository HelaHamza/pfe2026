http.host: "0.0.0.0"
xpack.monitoring.enabled: false  
xpack.monitoring.elasticsearch.hosts: [ "https://elasticsearch:9200" ] # URL de connexion à Elasticsearch
xpack.monitoring.elasticsearch.username: "logstash_system" # utilisateur dédié à la surveillance de Logstash
xpack.monitoring.elasticsearch.password: "${LOGSTASH_SYSTEM_PWD}"
xpack.monitoring.elasticsearch.ssl.certificate_authority: /usr/share/logstash/config/certs/full-chain.crt # chemin vers le certificat CA pou sécuriser la connexion à Elasticsearch
