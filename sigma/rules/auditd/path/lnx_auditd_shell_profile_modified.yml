title: Shell Profile Files Modified
id: 550e8400-e29b-41d4-a716-556655451006
status: stable
description: >
  Détecte la modification des fichiers de profil shell.
  Utilisé pour exécuter du code malveillant à chaque connexion.
author: hala-hamza
date: 2026/04/27
logsource:
  product: linux
  service: auditd
detection:
  selection:
    event.dataset: "auditd.log"
    message|contains: "PATH"
  keywords:
    message|contains:
      - ".bashrc"
      - ".bash_profile"
      - ".zshrc"
      - ".profile"
      - "/etc/profile"
      - "/etc/bash.bashrc"
  condition: selection and keywords
level: high
tags:
  - attack.persistence
  - attack.T1546.004
falsepositives:
  - Configuration shell légitime
