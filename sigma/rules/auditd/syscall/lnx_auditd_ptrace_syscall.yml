title: Ptrace Syscall Detected
id: 550e8400-e29b-41d4-a716-556655446003
status: stable
description: Détecte l'utilisation de ptrace - injection de processus
author: hala-hamza
date: 2026/04/27
logsource:
  product: linux
  service: auditd
detection:
  selection:
    event.dataset: "auditd.log"
    message|contains: "SYSCALL"
  keywords:
    message|contains:
      - "ptrace"
      - "PTRACE_ATTACH"
  condition: selection and keywords
level: high
tags:
  - attack.defense_evasion
  - attack.T1055
falsepositives:
  - Débogage légitime
