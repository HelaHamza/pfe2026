title: Process Masquerading
id: 550e8400-e29b-41d4-a716-556655450010
status: stable
description: >
  Détecte les processus qui se font passer pour des processus légitimes.
  Technique d'évasion courante des attaquants.
author: hala-hamza
date: 2026/04/27
logsource:
  product: linux
  service: auditd
detection:
  selection:
    event.dataset: "auditd.log"
    message|contains: "EXECVE"
  keywords:
    message|contains:
      - "kworker"
      - "kthreadd"
      - "migration"
      - "watchdog"
  suspicious_path:
    message|contains:
      - "/tmp/"
      - "/dev/shm/"
      - "/var/tmp/"
  condition: selection and keywords and suspicious_path
level: critical
tags:
  - attack.defense_evasion
  - attack.T1036.005
falsepositives:
  - Aucun
