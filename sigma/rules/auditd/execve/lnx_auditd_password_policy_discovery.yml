title: Password Policy Discovery
id: 550e8400-e29b-41d4-a716-556655443009
status: stable
description: Découverte des politiques de mot de passe
author: SigmaHQ
date: 2026/04/27
logsource:
  product: linux
  service: auditd
detection:
  selection:
    event.dataset: "auditd.log"
    message|contains: "EXECVE"
  keywords:
    message|contains:
      - "chage -l"
      - "chage --list"
      - "/etc/login.defs"
  condition: selection and keywords
level: low
tags:
  - attack.discovery
  - attack.T1201
falsepositives:
  - Audit de sécurité
