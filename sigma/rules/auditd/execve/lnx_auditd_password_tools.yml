title: Password Discovery Tools
id: 550e8400-e29b-41d4-a716-556655443004
status: stable
description: Détecte l'utilisation d'outils de découverte de mots de passe
author: hala-hamza
date: 2026/04/27
logsource:
  product: linux
  service: auditd
detection:
  selection:
    event.dataset: "auditd.log"
    message|contains: "EXECVE"
  keywords:
    message|contains:
      - "mimipenguin"
      - "lazagne"
      - "john "
      - "hashcat"
      - "hydra"
      - "medusa"
      - "crackmapexec"
  condition: selection and keywords
level: critical
tags:
  - attack.credential_access
  - attack.T1110
  - attack.T1003
falsepositives:
  - Tests de sécurité autorisés
