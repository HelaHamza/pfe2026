title: Compiler Execution on Linux
id: 550e8400-e29b-41d4-a716-556655450001
status: stable
description: >
  Détecte l'utilisation de compilateurs sur le système.
  Un attaquant peut compiler des outils malveillants directement
  sur la machine compromise.
author: hala-hamza
date: 2026/04/27
references:
  - https://attack.mitre.org/techniques/T1027/004/
logsource:
  product: linux
  service: auditd
detection:
  selection:
    event.dataset: "auditd.log"
    message|contains: "EXECVE"
  keywords:
    message|contains:
      - " gcc "
      - " g++ "
      - " cc "
      - " make "
      - " cmake "
      - " go build"
      - " rustc "
  condition: selection and keywords
level: medium
tags:
  - attack.defense_evasion
  - attack.T1027.004
falsepositives:
  - Développeurs légitimes
