title: Firewall Rules Manipulation
id: 550e8400-e29b-41d4-a716-556655460010
status: stable
description: >
  Détecte la modification des règles de firewall.
  Un attaquant peut ouvrir des ports pour faciliter son accès.
author: hala-hamza
date: 2026/04/27
logsource:
  product: linux
  service: auditd
detection:
  selection:
    event.dataset: "auditd.log"
    message|contains: "EXECVE"
  keywords:
    message|contains:
      - "iptables -F"
      - "iptables -X"
      - "iptables -A"
      - "ufw disable"
      - "ufw allow"
      - "firewall-cmd --add"
      - "nft flush"
  condition: selection and keywords
level: high
tags:
  - attack.defense_evasion
  - attack.T1562.004
falsepositives:
  - Administration réseau légitime
