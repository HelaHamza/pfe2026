title: Syslog Service Stopped
id: 550e8400-e29b-41d4-a716-556655445004
status: stable
description: Arrêt du service syslog - suppression des traces
author: hala-hamza
date: 2026/04/27
logsource:
  product: linux
  service: auditd
detection:
  selection:
    event.dataset: "auditd.log"
    message|contains: "SERVICE_STOP"
  keywords:
    message|contains:
      - "syslog"
      - "rsyslog"
      - "syslog-ng"
  condition: selection and keywords
level: critical
tags:
  - attack.defense_evasion
  - attack.T1070.002
falsepositives:
  - Maintenance système
