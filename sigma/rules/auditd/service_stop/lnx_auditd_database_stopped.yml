title: Database Service Stopped
id: 550e8400-e29b-41d4-a716-556655463001
status: stable
description: >
  Détecte l'arrêt de services de base de données.
  Peut précéder une attaque ransomware ou une exfiltration.
author: hala-hamza
date: 2026/04/27
logsource:
  product: linux
  service: auditd
detection:
  selection:
    event.dataset: "auditd.log"
    message|contains: "SERVICE_STOP"
  keywords:
    message|contains:
      - "mysql"
      - "mariadb"
      - "postgresql"
      - "mongodb"
      - "redis"
      - "elasticsearch"
  condition: selection and keywords
level: high
tags:
  - attack.impact
  - attack.T1489
falsepositives:
  - Maintenance de base de données
